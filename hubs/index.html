<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CEN 통일왕국 허브</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#081016">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#f3ead5;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#21190f}.top{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#081016,#172538 55%,#765016);padding:12px;color:#fff;display:flex;gap:10px;align-items:center;box-shadow:0 5px 18px rgba(40,25,8,.22)}.top button{height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-weight:900}.top .back{width:38px;font-size:18px}.top .menu{padding:0 12px;margin-left:auto}.titlebox{min-width:0;flex:1}.titlebox b{display:block;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.titlebox span{font-size:11px;color:#f1dfbd}.wrap{max-width:760px;margin:0 auto;padding:12px 10px 108px}.hero{border-radius:22px;padding:16px;border:1px solid #c9aa71;background:linear-gradient(135deg,#fff8e8,#e7c98f 70%,#b47a2b);box-shadow:0 4px 14px rgba(80,50,20,.12)}.hero.warn{background:linear-gradient(135deg,#fff5e4,#ddb57c 70%,#8b4a2a);border-color:#b48a56}.kicker{font-size:11px;font-weight:900;color:#7d5524}.hero h1{margin:8px 0 0;font-size:28px;color:#16213a;line-height:1.12}.hero.warn h1{color:#23150e}.hero p{line-height:1.58;color:#5c4426;font-weight:700;margin:9px 0 0;font-size:13.5px}.mood{margin-top:10px;display:inline-block;border-radius:999px;padding:6px 10px;background:rgba(22,33,58,.09);border:1px solid rgba(124,86,28,.25);color:#5c3f19;font-size:12px;font-weight:900}.sec{margin-top:16px}.sec h2{font-size:15px;color:#16213a;border-left:6px solid #b9862e;padding-left:8px;margin:0 0 8px}.card{background:#fffaf0;border:1px solid #d2bd96;border-radius:18px;padding:12px}.flow{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.node{background:#f4ecd8;border:1px solid #d1bb92;border-radius:14px;padding:8px;text-align:center;position:relative;min-width:0}.node:not(:last-child)::after{content:'›';position:absolute;right:-9px;top:50%;transform:translateY(-50%);color:#9a6b24;font-weight:900;font-size:20px}.node .ico{font-size:20px}.node b{display:block;font-size:10.5px;margin-top:4px}.node small{display:block;font-size:8.5px;color:#6b583f;margin-top:3px;line-height:1.25}.map img{width:100%;border-radius:14px;border:1px solid #ccb183;display:block}.mapExplain{margin-top:10px;background:#f7efdc;border:1px solid #d7bd8c;border-radius:14px;padding:10px 11px;font-size:12px;line-height:1.55;color:#4f3922;font-weight:700}.links{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.links button{padding:12px 7px;border-radius:14px;border:1px solid #c4a87b;background:#fff7e6;font-weight:900;color:#21190f}.links button.next{background:#7b561c;color:#fff6d5;border-color:#d9a943}.hubMessage{margin-top:12px;background:linear-gradient(135deg,#16213a,#7c561c);color:#fff5d7;border-radius:16px;padding:13px 12px;text-align:center;font-size:14px;line-height:1.45;font-weight:900}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:50;background:#efe3ca;border-top:1px solid #ccb183;display:flex;gap:8px;padding:10px;box-shadow:0 -6px 16px rgba(60,40,15,.16)}.bottom button{flex:1;padding:10px 4px;border-radius:12px;border:1px solid #c4a87b;background:#fff7e6;font-weight:900;font-size:11px;color:#21190f}.drawer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:1200;align-items:flex-end}.drawer.show{display:flex}.drawerPanel{width:100%;max-height:76vh;overflow:auto;background:#fffaf0;border-radius:20px 20px 0 0;border:1px solid #d2bd96}.drawerHead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #eadfc6}.drawerHead button{width:34px;height:34px;border:0;border-radius:10px;background:#eadfc6;font-size:22px}.hubItem{width:100%;text-align:left;border:0;border-bottom:1px solid #eadfc6;background:#fffaf0;padding:13px 16px}.hubItem b{display:block;color:#16213a}.hubItem span{font-size:12px;color:#6d5b40}@media(max-width:430px){.flow{grid-template-columns:repeat(3,minmax(0,1fr))}.node:not(:last-child)::after{display:none}.hero h1{font-size:25px}}
</style>
</head>
<body>
<header class="top"><button class="back" onclick="goMatrix()">←</button><div class="titlebox"><b id="topTitle">통일왕국 허브</b><span id="topSub">왕권 · 시온 · 임재 · 성전 · 분열</span></div><button class="menu" onclick="openDrawer()">허브</button></header>
<main class="wrap" id="app"></main>
<nav class="bottom"><button onclick="goMatrix()">Matrix</button><button onclick="openDrawer()">허브목록</button><button id="nextBottom">다음 허브</button></nav>
<div class="drawer" id="drawer"><div class="drawerPanel"><div class="drawerHead"><b>통일왕국 허브목록</b><button onclick="closeDrawer()">×</button></div><div id="hubList"></div></div></div>
<script>
const HUBS=[
{slug:'david',title:'다윗 즉위',sub:'하나님 마음에 합한 왕',kicker:'통일왕국 허브 01',hero:'선택된 왕이 왕좌에 오르다',text:'사무엘의 기름부음으로 시작된 다윗의 왕권은 통일왕국의 새로운 출발을 알립니다.',mood:'왕의 자격은 외형이 아니라 하나님을 향한 마음입니다.',flow:[['🫒','기름부음','선택'],['👑','즉위','왕권 시작'],['📜','언약','약속'],['🏙️','시온','중심'],['✡️','메시아','왕권 완성']],map:'assets/maps/david-goliath-map.png',mapExplain:'다윗의 이야기는 목자에서 왕으로 이어집니다. 하나님은 약한 자를 세워 왕국의 방향을 새롭게 하십니다.',next:'jerusalem',prev:'',message:'통일왕국의 출발점은 힘이 아니라<br>하나님이 선택하신 왕권입니다.'},
{slug:'jerusalem',title:'예루살렘 정복',sub:'왕국 중심이 세워지다',kicker:'통일왕국 허브 02',hero:'시온을 왕국의 수도로 삼다',text:'다윗은 예루살렘을 정복하여 남북 지파를 아우르는 왕국의 중심 도시로 세웁니다.',mood:'시온은 왕권과 예배와 약속이 만나는 자리입니다.',flow:[['⚔️','정복','시온 확보'],['🏰','수도','중심 확립'],['👑','왕권','통합'],['📦','언약궤','임재 이동'],['🏛️','성전','예배 중심']],map:'assets/maps/david-covenant-map.png',mapExplain:'예루살렘은 정치적 중심을 넘어 성전과 메시아 약속의 중심으로 확장됩니다.',next:'ark',prev:'david',message:'예루살렘 정복은 단순한 승리가 아니라<br>왕국의 중심을 세우는 사건입니다.'},
{slug:'ark',title:'언약궤 이전',sub:'하나님의 임재를 모시다',kicker:'통일왕국 허브 03',hero:'왕국 중심에 임재를 모시다',text:'언약궤가 예루살렘으로 옮겨지며 왕국의 중심이 왕좌가 아니라 하나님의 임재임을 드러냅니다.',mood:'왕국의 중심은 힘보다 임재입니다.',flow:[['📦','언약궤','임재'],['⚠️','웃사','거룩함'],['🏠','오벧에돔','복'],['🎶','찬양','기쁨'],['🏙️','시온','입성']],map:'assets/maps/ark-presence-map.png',mapExplain:'언약궤 이동은 성막에서 성전으로 이어지는 임재 흐름의 핵심 전환점입니다.',next:'temple',prev:'jerusalem',message:'통일왕국의 영광은<br>하나님의 임재를 중심에 모시는 데서 시작됩니다.'},
{slug:'temple',title:'성전 건축',sub:'예배 중심이 세워지다',kicker:'통일왕국 허브 04',hero:'솔로몬 성전의 영광',text:'솔로몬 성전은 통일왕국의 신앙·예배·왕국 질서가 절정에 이른 사건입니다.',mood:'성전은 통일왕국 황금기의 정점입니다.',flow:[['📦','언약궤','임재'],['👑','솔로몬','건축'],['🏛️','성전','예배'],['🔥','제사','거룩'],['☀️','영광','절정']],map:'assets/maps/solomon-temple-map.png',mapExplain:'성전은 이스라엘 예배의 중심이며, 이후 예수 그리스도와 교회 이해로 이어지는 큰 축입니다.',next:'division',prev:'ark',message:'성전 건축은 통일왕국의 절정이지만<br>동시에 이후 균열을 앞둔 정점이기도 합니다.'},
{slug:'division',title:'왕국 분열',sub:'하나의 왕국이 갈라지다',kicker:'통일왕국 허브 05',hero:'황금기의 균열과 분열',text:'솔로몬 이후 왕국은 북이스라엘과 남유다로 갈라지고, 분열왕국 시대가 시작됩니다.',mood:'분열은 실패이지만 이후 심판과 회복의 흐름을 엽니다.',flow:[['👑','솔로몬 이후','긴장'],['⚡','분열','갈라짐'],['🐂','북이스라엘','여로보암'],['🦁','남유다','르호보암'],['🔄','다음 시대','분열왕국']],map:'assets/maps/kingdom-division-map.png',mapExplain:'왕국 분열은 통일왕국의 끝이자 분열왕국 Matrix로 넘어가는 결정적 연결점입니다.',next:'',prev:'temple',warn:true,message:'하나의 왕국은 갈라졌지만<br>하나님의 구속사는 멈추지 않습니다.'}
];
const $=id=>document.getElementById(id);function currentSlug(){return new URLSearchParams(location.search).get('hub')||'david'}function findHub(slug){return HUBS.find(h=>h.slug===slug)||HUBS[0]}function goMatrix(){location.href='../index.html'}function openDrawer(){$('drawer').classList.add('show')}function closeDrawer(){$('drawer').classList.remove('show')}function goHub(slug){if(!slug)return;location.href='index.html?hub='+slug}function render(){const h=findHub(currentSlug());document.title='CEN '+h.title+' 허브';$('topTitle').textContent=h.title+' 허브';$('topSub').textContent=h.sub;const cls=h.warn?'hero warn':'hero';$('app').innerHTML=`<section class="${cls}"><div class="kicker">${h.kicker}</div><h1>${h.hero}</h1><p>${h.text}</p><span class="mood">${h.mood}</span></section><section class="sec"><h2>핵심 흐름</h2><div class="card flow">${h.flow.map(n=>`<div class="node"><div class="ico">${n[0]}</div><b>${n[1]}</b><small>${n[2]}</small></div>`).join('')}</div></section><section class="sec map"><h2>허브 지도</h2><div class="card"><img src="${h.map}" alt="${h.title} 지도"><div class="mapExplain">${h.mapExplain}</div></div></section><section class="sec"><h2>허브 이동</h2><div class="links"><button onclick="goHub('${h.prev}')">이전 허브</button><button class="next" onclick="goHub('${h.next}')">다음 허브</button></div><div class="hubMessage">${h.message}</div></section>`;$('nextBottom').onclick=()=>h.next?goHub(h.next):goMatrix();$('nextBottom').textContent=h.next?'다음 허브':'Matrix';$('hubList').innerHTML=HUBS.map(x=>`<button class="hubItem" onclick="goHub('${x.slug}')"><b>${x.title} 허브</b><span>${x.sub}</span></button>`).join('')}render();
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
</script>
</body>
</html>
