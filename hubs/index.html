<script>
const HUBS=[
{slug:'david',icon:'👑',title:'다윗 즉위',sub:'하나님 마음에 합한 왕',kicker:'',overview:'하나님께 선택된 다윗은 베들레헴에서 기름부음을 받고 골리앗을 물리쳤다. 이후 광야 도피 생활을 거쳐 헤브론에서 유다의 왕이 되었으며, 마침내 예루살렘에서 통일왕국의 왕으로 세워졌다.',map:'assets/maps/david-map.png',mapExplain:'베들레헴에서 시작된 다윗의 부르심은 엘라 골짜기의 승리, 아둘람의 도피, 헤브론의 즉위를 거쳐 예루살렘의 통일왕국 왕권으로 이어진다.',verse:'“사무엘이 기름 뿔병을 가져다가 그의 형제 중에서 그에게 부었더니 이 날 이후로 다윗이 여호와의 영에게 크게 감동되니라.”<strong>사무엘상 16:13</strong>',events:['사울의 실패 이후 새 왕을 찾으심','베들레헴에서 다윗이 기름부음을 받음','엘라 골짜기에서 골리앗을 물리침','사울을 피해 광야와 아둘람에서 도피 생활을 함','헤브론에서 유다의 왕이 되고 이후 예루살렘에서 온 이스라엘의 왕이 됨'],meaning:['왕권은 인간의 외형이 아니라 하나님의 선택에서 시작됨','다윗은 통일왕국과 다윗언약의 출발점이 됨','참 왕이신 메시아를 기다리게 하는 왕권의 원형'],connections:['❓ 핵심질문 하나님은 왜 다윗을 왕으로 선택하셨을까?','💡 한 줄 핵심 하나님은 중심을 보시고 왕을 세우신다.','📖 사건의 의미 다윗 왕권은 하나님 나라의 새로운 출발점이다.','🔗 연결 흐름 사사시대 → 사무엘 → 다윗언약 → 메시아','🤔 생각해보기 나는 무엇으로 사람을 판단하는가?'],integrated:['❓ 핵심질문 다윗 왕권은 구속사에서 어떤 의미가 있을까?','💡 한 줄 핵심 다윗은 오실 메시아의 예표이다.','📖 구속사 의미 다윗언약을 통해 구원자의 계보가 이어진다.','🌍 성경 전체 흐름 사사시대 → 다윗왕국 → 예수 그리스도','🤔 생각해보기 하나님은 오늘 어떤 사람을 사용하실까?'],refs:['사무엘상 16장','사무엘상 17장','사무엘상 22장','사무엘하 2장','사무엘하 5장'],message:'하나님은 외모가 아니라 중심을 보시며, 그분의 나라를 위해 사람을 세우신다.',prev:'',next:'jerusalem'},
{slug:'jerusalem',icon:'🏰',title:'예루살렘 정복',sub:'왕국 중심이 세워지다',kicker:'',overview:'다윗은 헤브론에서 왕으로 통치한 후 여부스 족속의 성읍 예루살렘을 정복하였다. 예루살렘은 다윗성으로 불리며 이스라엘의 정치적 중심지가 되었다.',map:'assets/maps/jerusalem-map.png',mapExplain:'헤브론에서 시작된 다윗의 왕권은 예루살렘 정복을 통해 왕국의 중심을 확보한다. 다윗성, 시온산은 이후 왕권과 예배와 메시아 약속이 모이는 핵심 장소가 된다.',verse:'“다윗이 시온 산성을 빼앗았으니 이는 다윗 성이더라.”<strong>사무엘하 5:7</strong>',events:['다윗이 헤브론에서 유다를 다스림','온 이스라엘의 왕으로 세워짐','여부스 족속의 성읍 예루살렘을 정복함','시온 산성이 다윗성으로 불림','예루살렘이 통일왕국의 수도가 됨'],meaning:['예루살렘은 남북 지파를 아우르는 왕국 중심지가 됨','시온은 왕권·예배·언약 약속이 만나는 장소가 됨','이후 성전과 메시아 사역의 무대가 준비됨'],connections:['❓ 핵심질문 왜 예루살렘이 왕국의 중심이 되었을까?','💡 한 줄 핵심 하나님은 예루살렘을 왕권과 예배의 중심으로 세우셨다.','📖 사건의 의미 통일왕국의 중심 도시가 확립되었다.','🔗 연결 흐름 다윗 즉위 → 예루살렘 정복 → 성전 건축','🤔 생각해보기 내 삶의 중심에는 무엇이 있는가?'],integrated:['❓ 핵심질문 예루살렘은 성경 전체에서 어떤 의미가 있을까?','💡 한 줄 핵심 예루살렘은 구속사의 중심 무대이다.','📖 구속사 의미 왕권과 언약이 모이는 장소가 된다.','🌍 성경 전체 흐름 다윗성 → 성전 → 십자가 → 새 예루살렘','🤔 생각해보기 하나님 나라의 중심은 어디에 있는가?'],refs:['사무엘하 5장','역대상 11장','시편 48편','시편 122편'],message:'하나님은 자신의 나라를 세우기 위해 중심을 마련하신다.',prev:'david',next:'ark'},
{slug:'ark',icon:'📦',title:'언약궤 이전',sub:'하나님의 임재를 모시다',kicker:'',overview:'오랫동안 기럇여아림에 머물던 언약궤는 예루살렘으로 옮겨지는 과정에서 웃사의 죽음 사건을 겪었다. 이후 오벧에돔의 집에 머문 뒤 예루살렘에 안치되어 하나님의 임재를 상징하게 되었다.',map:'assets/maps/ark-map.png',mapExplain:'기럇여아림에 머물던 언약궤는 베레스웃사 사건을 거치며 하나님의 거룩함을 드러낸다. 오벧에돔의 집에 머문 뒤 예루살렘으로 옮겨져 왕국의 중심에 하나님의 임재가 자리한다.',verse:'“다윗이 여호와 앞에서 힘을 다하여 춤을 추는데 그 때에 다윗이 베 에봇을 입었더라.”<strong>사무엘하 6:14</strong>',events:['언약궤가 기럇여아림에 오래 머묾','새 수레로 옮기던 중 웃사가 죽음','언약궤가 오벧에돔의 집에 석 달 동안 머묾','하나님이 오벧에돔의 집에 복을 주심','다윗이 기쁨과 찬양으로 언약궤를 예루살렘에 모심'],meaning:['하나님의 임재는 기쁨이지만 동시에 거룩함을 요구함','왕국의 중심은 왕권이 아니라 하나님의 임재여야 함','성전 건축으로 이어지는 임재의 흐름을 준비함'],connections:['❓ 핵심질문 하나님께 가까이 가는 데 왜 거룩함이 필요할까?','💡 한 줄 핵심 하나님의 임재는 기쁨이자 거룩함이다.','📖 사건의 의미 왕국의 중심은 왕이 아니라 하나님이심을 보여준다.','🔗 연결 흐름 성막 → 언약궤 → 성전 → 그리스도','🤔 생각해보기 나는 하나님을 어떤 태도로 예배하는가?'],integrated:['❓ 핵심질문 언약궤는 구속사에서 무엇을 상징할까?','💡 한 줄 핵심 하나님은 백성과 함께 거하시기를 원하신다.','📖 구속사 의미 임재의 약속이 그리스도 안에서 완성된다.','🌍 성경 전체 흐름 광야 성막 → 언약궤 → 성전 → 임마누엘','🤔 생각해보기 하나님 임재를 가장 소중히 여기고 있는가?'],refs:['사무엘하 6장','역대상 13장','역대상 15장','역대상 16장'],message:'하나님의 백성은 하나님의 임재를 가장 소중히 여기되, 하나님의 방식대로 가까이해야 한다.',prev:'jerusalem',next:'temple'},
{slug:'temple',icon:'🏛️',title:'성전 건축',sub:'예배 중심이 세워지다',kicker:'',overview:'솔로몬은 두로 왕 히람의 지원을 받아 성전 건축 재료를 공급받았다. 예루살렘 모리아산에 성전을 건축하여 이스라엘 예배의 중심을 세웠다.',map:'assets/maps/temple-map.png',mapExplain:'두로에서 공급된 재료와 기술은 예루살렘으로 옮겨지고, 모리아산에서 성전 건축으로 이어진다. 성전은 통일왕국의 영광이 절정에 이른 상징이 된다.',verse:'“제사장이 성소에서 나올 때에 구름이 여호와의 성전에 가득하매… 이는 여호와의 영광이 여호와의 성전에 가득함이었더라.”<strong>열왕기상 8:10-11</strong>',events:['솔로몬이 두로 왕 히람과 협력함','백향목과 건축 재료를 공급받음','예루살렘 모리아산에 성전을 건축함','언약궤를 성전에 안치함','성전 봉헌 때 여호와의 영광이 가득함'],meaning:['성전은 통일왕국의 예배 중심이자 영광의 절정임','하나님은 자기 백성 가운데 거하시기를 원하심','성전은 예수 그리스도와 교회로 이어지는 중요한 예표'],connections:['❓ 핵심질문 성전은 왜 중요한가?','💡 한 줄 핵심 성전은 하나님 임재와 예배의 중심이다.','📖 사건의 의미 통일왕국의 영광이 절정에 이른다.','🔗 연결 흐름 성막 → 성전 → 예수 그리스도 → 교회','🤔 생각해보기 참된 예배는 무엇일까?'],integrated:['❓ 핵심질문 성전은 어떻게 예수님을 가리킬까?','💡 한 줄 핵심 성전은 오실 그리스도의 그림자이다.','📖 구속사 의미 하나님과 만나는 길이 예수님 안에서 완성된다.','🌍 성경 전체 흐름 성막 → 솔로몬 성전 → 재건 성전 → 그리스도','🤔 생각해보기 나는 예배를 얼마나 소중히 여기는가?'],refs:['열왕기상 5장','열왕기상 6장','열왕기상 8장','역대하 3장','역대하 5장','역대하 7장'],message:'하나님은 건물 자체보다, 그분의 임재를 중심에 두는 순종의 백성을 원하신다.',prev:'ark',next:'division'},
{slug:'division',icon:'⚡',title:'왕국 분열',sub:'하나의 왕국이 갈라지다',kicker:'',overview:'솔로몬 사후 르호보암은 세겜에서 백성들의 요구를 거절하였다. 그 결과 왕국은 북이스라엘과 남유다로 분열되었으며, 이후 서로 다른 길을 걷게 되었다.',map:'assets/maps/division-map.png',mapExplain:'예루살렘에서 이어진 솔로몬 왕조는 세겜의 결정 앞에서 균열을 맞는다. 세겜 이후 북쪽은 사마리아 중심의 북이스라엘로, 남쪽은 예루살렘 중심의 남유다로 갈라진다.',verse:'“우리가 다윗과 무슨 관계가 있느냐… 이스라엘아 너희의 장막으로 돌아가라.”<strong>열왕기상 12:16</strong>',events:['솔로몬 말기에 우상숭배와 세금 부담이 커짐','르호보암이 세겜에서 백성의 요구를 들음','원로들의 조언을 버리고 젊은 신하들의 강경책을 따름','열 지파가 르호보암을 거부하고 여로보암을 따름','북이스라엘과 남유다로 왕국이 분열됨'],meaning:['교만과 불순종은 공동체를 갈라놓음','분열은 심판이지만 다윗 언약의 약속은 남유다를 통해 이어짐','분열왕국 시대의 긴 쇠퇴와 선지자 사역을 여는 전환점'],connections:['❓ 핵심질문 왜 강대한 왕국이 분열되었을까?','💡 한 줄 핵심 불순종과 교만은 공동체를 무너뜨린다.','📖 사건의 의미 인간 왕권의 한계가 드러난다.','🔗 연결 흐름 솔로몬 타락 → 왕국 분열 → 선지자 시대','🤔 생각해보기 나는 충고를 겸손히 듣고 있는가?'],integrated:['❓ 핵심질문 왕국 분열 이후에도 구속사는 왜 계속될까?','💡 한 줄 핵심 인간은 실패해도 하나님의 계획은 멈추지 않는다.','📖 구속사 의미 남은 자를 통해 메시아 약속이 이어진다.','🌍 성경 전체 흐름 분열왕국 → 포로 → 귀환 → 그리스도','🤔 생각해보기 실패 속에서도 하나님은 무엇을 이루실까?'],refs:['열왕기상 11장','열왕기상 12장','역대하 10장','역대하 11장'],message:'하나의 왕국은 갈라졌지만, 하나님의 구속사는 멈추지 않는다.',prev:'temple',next:'',warn:true,nextEra:{label:'분열왕국 Matrix',url:'https://centiger.github.io/CEN-M07-Divided/',desc:'왕국 분열 이후 북이스라엘과 남유다는 서로 다른 길을 걷게 됩니다.'}}
];
const $=id=>document.getElementById(id);function currentSlug(){return new URLSearchParams(location.search).get('hub')||'david'}function findHub(slug){return HUBS.find(h=>h.slug===slug)||HUBS[0]}function goMatrix(){location.href='../index.html'}function openDrawer(){$('drawer').classList.add('show')}function closeDrawer(){$('drawer').classList.remove('show')}function goHub(slug){if(!slug)return;location.href='index.html?hub='+slug}function list(items){return `<ul class="list">${items.map(x=>`<li>${x}</li>`).join('')}</ul>`}
function renderExplore(items){
  function escapeLocal(s){
    return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function hasEmoji(s){
    return /[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u.test(String(s||''));
  }
  function iconForStep(s){
    const t=String(s||'');
    if(/사사/.test(t)) return '⚖️';
    if(/사무엘/.test(t)) return '👴';
    if(/다윗성|다윗|왕권|왕국/.test(t)) return '👑';
    if(/예루살렘|시온/.test(t)) return '🏰';
    if(/언약궤|임재/.test(t)) return '📦';
    if(/성막/.test(t)) return '⛺';
    if(/성전|성전산|예배/.test(t)) return '🏛️';
    if(/솔로몬/.test(t)) return '🧠';
    if(/분열|북이스라엘|남유다/.test(t)) return '⚡';
    if(/십자가/.test(t)) return '✝️';
    if(/예수|그리스도|메시아/.test(t)) return '✝️';
    if(/새 예루살렘|새창조/.test(t)) return '👑';
    if(/포로|바벨론/.test(t)) return '⛓️';
    if(/귀환|회복/.test(t)) return '🚶';
    if(/교회/.test(t)) return '⛪';
    return '🔹';
  }

  const labels=[
    '❓ 핵심질문',
    '💡 한 줄 핵심',
    '📖 사건의 의미',
    '📖 구속사 의미',
    '🔗 연결 흐름',
    '🌍 성경 전체 흐름',
    '🤔 생각해보기'
  ];

  function splitItem(x){
    let raw='';
    if(typeof x==='string'){
      raw=String(x||'').trim();
    }else{
      const t=String(x.title||x.label||'').trim();
      const body=String(x.text||x.content||x.body||'').trim();
      raw=(t + (body ? ' ' + body : '')).trim();
    }

    raw=raw.replace(/\s*\|\s*/g,' ');

    for(const label of labels){
      if(raw.startsWith(label)){
        return {title:label, text:raw.slice(label.length).trim()};
      }
    }

    return {title:'', text:raw};
  }

  function verticalFlowHtml(text){
    const raw=String(text||'').trim();
    const parts=raw.split(/\s*(?:→|↓)\s*/).map(v=>v.trim()).filter(Boolean);
    if(parts.length<2) return escapeLocal(raw).replace(/\n/g,'<br>');
    return parts.map(step=>{
      const labeled=hasEmoji(step) ? step : `${iconForStep(step)} ${step}`;
      return escapeLocal(labeled);
    }).join('<br>↓<br>');
  }

  return (items||[]).map(x=>{
    const item=splitItem(x);
    const isFlow=/연결\s*흐름|성경\s*전체\s*흐름/.test(item.title) || item.text.includes('→') || item.text.includes('↓');
    const body=isFlow ? verticalFlowHtml(item.text) : escapeLocal(item.text).replace(/\n/g,'<br>');
    return `<div class="exploreCard"><b>${escapeLocal(item.title)}</b><p>${body}</p></div>`;
  }).join('');
}


function scrollToCurrentHash(){
  const id=(location.hash||'').replace('#','');
  if(id!=='connections' && id!=='integration') return;
  const target=document.getElementById(id);
  if(!target) return;
  requestAnimationFrame(()=>{
    const topBar=document.querySelector('.top');
    const offset=(topBar?.offsetHeight||0)+8;
    const y=target.getBoundingClientRect().top+window.pageYOffset-offset;
    window.scrollTo({top:y,behavior:'auto'});
  });
}
function render(){const h=findHub(currentSlug());document.title='CEN '+h.title+' 허브';$('topTitle').textContent=h.title+' 허브';$('topSub').textContent=h.sub;const cls=h.warn?'hero warn':'hero';$('app').innerHTML=`<section class="${cls}"><div class="kicker">${h.kicker}</div><h1>${h.title} 허브</h1><p>${h.overview}</p><span class="mood">${h.sub}</span></section><section class="sec map"><h2>허브지도 / 지도설명문</h2><div class="card"><img src="${h.map}" alt="${h.title} 지도"><div class="mapExplain">${h.mapExplain}</div></div></section><section class="sec"><h2>대표성구</h2><div class="card quote">${h.verse}</div></section><section class="sec"><h2>핵심사건</h2><div class="card">${list(h.events)}</div></section><section class="sec"><h2>핵심의미</h2><div class="card">${list(h.meaning)}</div></section><section class="sec"><h2 id="connections">Meaning</h2><div class="card exploreGrid">${renderExplore(h.connections)}</div></section><section class="sec"><h2 id="integration">파노라마</h2><div class="card exploreGrid">${renderExplore(h.integrated||h.integration)}</div></section><section class="sec"><h2>관련성경</h2><div class="card grid">${h.refs.map(x=>`<div class="pill">${x}</div>`).join('')}</div></section><section class="sec"><h2>핵심메시지</h2><div class="message">${h.message}</div></section>`;$('nextBottom').onclick=()=>{ if(h.next) return goHub(h.next); if(h.nextEra&&h.nextEra.url) return location.href=h.nextEra.url; return goMatrix(); };$('nextBottom').textContent=h.next?'다음 허브':(h.nextEra?h.nextEra.label:'Matrix');$('hubList').innerHTML=HUBS.map(x=>`<button class="hubItem" onclick="goHub('${x.slug}')"><b>${x.icon} ${x.title} 허브</b><span>${x.sub}</span></button>`).join('');scrollToCurrentHash();}render();if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
</script>
