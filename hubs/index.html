<script>
const HUBS=[
{slug:'david',icon:'👑',title:'다윗 즉위',sub:'하나님 마음에 합한 왕',kicker:'통일왕국 허브 01',overview:'하나님께 선택된 다윗은 베들레헴에서 기름부음을 받고 골리앗을 물리쳤다. 이후 광야 도피 생활을 거쳐 헤브론에서 유다의 왕이 되었으며, 마침내 예루살렘에서 통일왕국의 왕으로 세워졌다.',map:'assets/maps/david-map.png',mapExplain:'베들레헴에서 시작된 다윗의 부르심은 엘라 골짜기의 승리, 아둘람의 도피, 헤브론의 즉위를 거쳐 예루살렘의 통일왕국 왕권으로 이어진다.',verse:'“사무엘이 기름 뿔병을 가져다가 그의 형제 중에서 그에게 부었더니 이 날 이후로 다윗이 여호와의 영에게 크게 감동되니라.”<strong>사무엘상 16:13</strong>',events:['사울의 실패 이후 새 왕을 찾으심','베들레헴에서 다윗이 기름부음을 받음','엘라 골짜기에서 골리앗을 물리침','사울을 피해 광야와 아둘람에서 도피 생활을 함','헤브론에서 유다의 왕이 되고 이후 예루살렘에서 온 이스라엘의 왕이 됨'],meaning:['왕권은 인간의 외형이 아니라 하나님의 선택에서 시작됨','다윗은 통일왕국과 다윗언약의 출발점이 됨','참 왕이신 메시아를 기다리게 하는 왕권의 원형'],connections:['왕권의 흐름: 사사시대 혼란 → 사무엘 → 다윗 왕권','메시아의 흐름: 다윗 → 다윗언약 → 예수 그리스도','믿음의 승리: 골리앗 사건 → 하나님의 이름으로 싸움'],integrated:['사사시대 “왕이 없던 시대”의 혼란과 연결됨','다윗의 왕권은 예루살렘 정복과 성전 준비로 이어짐','다윗의 실패와 회복까지 포함해 왕권의 한계와 은혜를 함께 보여줌'],refs:['사무엘상 16장','사무엘상 17장','사무엘상 22장','사무엘하 2장','사무엘하 5장'],message:'하나님은 외모가 아니라 중심을 보시며, 그분의 나라를 위해 사람을 세우신다.',prev:'',next:'jerusalem'},
{slug:'jerusalem',icon:'🏰',title:'예루살렘 정복',sub:'왕국 중심이 세워지다',kicker:'통일왕국 허브 02',overview:'다윗은 헤브론에서 왕으로 통치한 후 여부스 족속의 성읍 예루살렘을 정복하였다. 예루살렘은 다윗성으로 불리며 이스라엘의 정치적 중심지가 되었다.',map:'assets/maps/jerusalem-map.png',mapExplain:'헤브론에서 시작된 다윗의 왕권은 예루살렘 정복을 통해 왕국의 중심을 확보한다. 다윗성, 시온산은 이후 왕권과 예배와 메시아 약속이 모이는 핵심 장소가 된다.',verse:'“다윗이 시온 산성을 빼앗았으니 이는 다윗 성이더라.”<strong>사무엘하 5:7</strong>',events:['다윗이 헤브론에서 유다를 다스림','온 이스라엘의 왕으로 세워짐','여부스 족속의 성읍 예루살렘을 정복함','시온 산성이 다윗성으로 불림','예루살렘이 통일왕국의 수도가 됨'],meaning:['예루살렘은 남북 지파를 아우르는 왕국 중심지가 됨','시온은 왕권·예배·언약 약속이 만나는 장소가 됨','이후 성전과 메시아 사역의 무대가 준비됨'],connections:['시온의 흐름: 다윗성 → 성전산 → 예루살렘 → 새 예루살렘','하나님 나라의 흐름: 중심 도시 확립 → 왕국 질서 형성','성전의 흐름: 예루살렘 정복 → 언약궤 이전 → 성전 건축'],integrated:['정치적 수도와 신앙적 중심이 하나로 모이는 사건','다윗 왕권과 솔로몬 성전 건축을 연결하는 다리','예수시대 예루살렘 사건들과도 직접 연결됨'],refs:['사무엘하 5장','역대상 11장','시편 48편','시편 122편'],message:'하나님은 자신의 나라를 세우기 위해 중심을 마련하신다.',prev:'david',next:'ark'},
{slug:'ark',icon:'📦',title:'언약궤 이전',sub:'하나님의 임재를 모시다',kicker:'통일왕국 허브 03',overview:'오랫동안 기럇여아림에 머물던 언약궤는 예루살렘으로 옮겨지는 과정에서 웃사의 죽음 사건을 겪었다. 이후 오벧에돔의 집에 머문 뒤 예루살렘에 안치되어 하나님의 임재를 상징하게 되었다.',map:'assets/maps/ark-map.png',mapExplain:'기럇여아림에 머물던 언약궤는 베레스웃사 사건을 거치며 하나님의 거룩함을 드러낸다. 오벧에돔의 집에 머문 뒤 예루살렘으로 옮겨져 왕국의 중심에 하나님의 임재가 자리한다.',verse:'“다윗이 여호와 앞에서 힘을 다하여 춤을 추는데 그 때에 다윗이 베 에봇을 입었더라.”<strong>사무엘하 6:14</strong>',events:['언약궤가 기럇여아림에 오래 머묾','새 수레로 옮기던 중 웃사가 죽음','언약궤가 오벧에돔의 집에 석 달 동안 머묾','하나님이 오벧에돔의 집에 복을 주심','다윗이 기쁨과 찬양으로 언약궤를 예루살렘에 모심'],meaning:['하나님의 임재는 기쁨이지만 동시에 거룩함을 요구함','왕국의 중심은 왕권이 아니라 하나님의 임재여야 함','성전 건축으로 이어지는 임재의 흐름을 준비함'],connections:['임재의 흐름: 성막 → 언약궤 → 시온 → 성전','예배의 흐름: 두려움 → 질서 → 찬양 → 기쁨','거룩의 흐름: 웃사의 죽음 → 하나님의 방식대로 섬김'],integrated:['예루살렘 정복 이후 왕국 중심에 임재를 모시는 사건','솔로몬 성전의 언약궤 안치로 이어짐','예수 그리스도 안에서 완성되는 임재 신학과 연결됨'],refs:['사무엘하 6장','역대상 13장','역대상 15장','역대상 16장'],message:'하나님의 백성은 하나님의 임재를 가장 소중히 여기되, 하나님의 방식대로 가까이해야 한다.',prev:'jerusalem',next:'temple'},
{slug:'temple',icon:'🏛️',title:'성전 건축',sub:'예배 중심이 세워지다',kicker:'통일왕국 허브 04',overview:'솔로몬은 두로 왕 히람의 지원을 받아 성전 건축 재료를 공급받았다. 예루살렘 모리아산에 성전을 건축하여 이스라엘 예배의 중심을 세웠다.',map:'assets/maps/temple-map.png',mapExplain:'두로에서 공급된 재료와 기술은 예루살렘으로 옮겨지고, 모리아산에서 성전 건축으로 이어진다. 성전은 통일왕국의 영광이 절정에 이른 상징이 된다.',verse:'“제사장이 성소에서 나올 때에 구름이 여호와의 성전에 가득하매… 이는 여호와의 영광이 여호와의 성전에 가득함이었더라.”<strong>열왕기상 8:10-11</strong>',events:['솔로몬이 두로 왕 히람과 협력함','백향목과 건축 재료를 공급받음','예루살렘 모리아산에 성전을 건축함','언약궤를 성전에 안치함','성전 봉헌 때 여호와의 영광이 가득함'],meaning:['성전은 통일왕국의 예배 중심이자 영광의 절정임','하나님은 자기 백성 가운데 거하시기를 원하심','성전은 예수 그리스도와 교회로 이어지는 중요한 예표'],connections:['성전의 흐름: 성막 → 언약궤 → 솔로몬 성전 → 예수 그리스도','영광의 흐름: 구름과 영광 → 성전 충만 → 임마누엘','예배의 흐름: 제사 → 성전 → 참 예배'],integrated:['다윗이 준비하고 솔로몬이 완성한 왕국 절정 사건','성전 건축 후에도 순종 없이는 영광이 지속되지 않음을 보여줌','포로귀환 성전 재건과 예수시대 성전 논쟁으로 연결됨'],refs:['열왕기상 5장','열왕기상 6장','열왕기상 8장','역대하 3장','역대하 5장','역대하 7장'],message:'하나님은 건물 자체보다, 그분의 임재를 중심에 두는 순종의 백성을 원하신다.',prev:'ark',next:'division'},
{slug:'division',icon:'⚡',title:'왕국 분열',sub:'하나의 왕국이 갈라지다',kicker:'통일왕국 허브 05',overview:'솔로몬 사후 르호보암은 세겜에서 백성들의 요구를 거절하였다. 그 결과 왕국은 북이스라엘과 남유다로 분열되었으며, 이후 서로 다른 길을 걷게 되었다.',map:'assets/maps/division-map.png',mapExplain:'예루살렘에서 이어진 솔로몬 왕조는 세겜의 결정 앞에서 균열을 맞는다. 세겜 이후 북쪽은 사마리아 중심의 북이스라엘로, 남쪽은 예루살렘 중심의 남유다로 갈라진다.',verse:'“우리가 다윗과 무슨 관계가 있느냐… 이스라엘아 너희의 장막으로 돌아가라.”<strong>열왕기상 12:16</strong>',events:['솔로몬 말기에 우상숭배와 세금 부담이 커짐','르호보암이 세겜에서 백성의 요구를 들음','원로들의 조언을 버리고 젊은 신하들의 강경책을 따름','열 지파가 르호보암을 거부하고 여로보암을 따름','북이스라엘과 남유다로 왕국이 분열됨'],meaning:['교만과 불순종은 공동체를 갈라놓음','분열은 심판이지만 다윗 언약의 약속은 남유다를 통해 이어짐','분열왕국 시대의 긴 쇠퇴와 선지자 사역을 여는 전환점'],connections:['심판의 흐름: 솔로몬의 타락 → 왕국 분열 → 북이스라엘 멸망 → 유다 멸망','회복의 흐름: 남은 자 → 포로귀환 → 메시아 약속','왕권의 흐름: 다윗 왕권의 약속과 인간 왕권의 한계'],integrated:['통일왕국 Matrix의 마지막 사건이자 분열왕국 Matrix의 출발점','북이스라엘과 남유다의 서로 다른 역사를 여는 기준점','하나님 나라가 인간 왕국의 실패를 넘어 계속 진행됨을 보여줌'],refs:['열왕기상 11장','열왕기상 12장','역대하 10장','역대하 11장'],message:'하나의 왕국은 갈라졌지만, 하나님의 구속사는 멈추지 않는다.',prev:'temple',next:'',warn:true,nextEra:{label:'분열왕국 Matrix',desc:'왕국 분열 이후 북이스라엘과 남유다는 서로 다른 길을 걷게 됩니다.'}}
];
const $=id=>document.getElementById(id);function currentSlug(){return new URLSearchParams(location.search).get('hub')||'david'}function findHub(slug){return HUBS.find(h=>h.slug===slug)||HUBS[0]}function goMatrix(){location.href='../index.html'}function openDrawer(){$('drawer').classList.add('show')}function closeDrawer(){$('drawer').classList.remove('show')}function goHub(slug){if(!slug)return;location.href='index.html?hub='+slug}function list(items){return `<ul class="list">${items.map(x=>`<li>${x}</li>`).join('')}</ul>`}function render(){const h=findHub(currentSlug());document.title='CEN '+h.title+' 허브';$('topTitle').textContent=h.title+' 허브';$('topSub').textContent=h.sub;const cls=h.warn?'hero warn':'hero';$('app').innerHTML=`<section class="${cls}"><div class="kicker">${h.kicker}</div><h1>${h.title} 허브</h1><p>${h.overview}</p><span class="mood">${h.sub}</span></section><section class="sec map"><h2>허브지도 / 지도설명문</h2><div class="card"><img src="${h.map}" alt="${h.title} 지도"><div class="mapExplain">${h.mapExplain}</div></div></section><section class="sec"><h2>대표성구</h2><div class="card quote">${h.verse}</div></section><section class="sec"><h2>핵심사건</h2><div class="card">${list(h.events)}</div></section><section class="sec"><h2>핵심의미</h2><div class="card">${list(h.meaning)}</div></section><section class="sec"><h2>연결탐험</h2><div class="card grid">${h.connections.map(x=>`<div class="pill">${x}</div>`).join('')}</div></section><section class="sec"><h2>통합탐험</h2><div class="card grid">${h.integrated.map(x=>`<div class="pill">${x}</div>`).join('')}</div></section><section class="sec"><h2>관련성경</h2><div class="card grid">${h.refs.map(x=>`<div class="pill">${x}</div>`).join('')}</div></section><section class="sec"><h2>핵심메시지</h2><div class="message">${h.message}</div></section>`;$('nextBottom').onclick=()=>h.next?goHub(h.next):goMatrix();$('nextBottom').textContent=h.next?'다음 허브':(h.nextEra?h.nextEra.label:'Matrix');$('hubList').innerHTML=HUBS.map(x=>`<button class="hubItem" onclick="goHub('${x.slug}')"><b>${x.icon} ${x.title} 허브</b><span>${x.sub}</span></button>`).join('')}render();if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
</script>
