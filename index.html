<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#081016" />
  <meta name="description" content="CEN Bible 통일왕국 Matrix" />
  <meta property="og:title" content="CEN Bible 통일왕국 Matrix" />
  <meta property="og:description" content="다윗 즉위부터 왕국 분열까지 통일왕국 핵심사건 Matrix" />
  <meta property="og:image" content="assets/united-kingdom-bg.png" />
  <title>CEN Bible 통일왕국 Matrix</title>

<style id="CEN-UNIFIED-FOOTER-V5-CSS">
body{padding-bottom:92px!important}
.unifiedDock{position:fixed!important;left:50%!important;bottom:0!important;transform:translateX(-50%)!important;width:100%!important;max-width:560px!important;z-index:3000!important;padding:5px 10px calc(7px + env(safe-area-inset-bottom))!important;background:linear-gradient(to top,rgba(4,8,12,.98),rgba(9,18,26,.92))!important;border-top:1px solid rgba(247,216,137,.24)!important;box-shadow:0 -10px 24px rgba(0,0,0,.42)!important;backdrop-filter:blur(16px)!important;display:block!important;min-height:auto!important}
.unifiedDock .coreFlow{margin:0 0 4px!important;text-align:center!important;color:#f7d889!important;font-weight:900!important;line-height:1.18!important;font-size:clamp(10px,2.65vw,14px)!important;letter-spacing:-.055em!important;text-shadow:0 2px 6px rgba(0,0,0,.85)!important;white-space:normal!important;overflow:visible!important;text-overflow:clip!important}
.unifiedDock .coreFlow small{display:block!important;margin-bottom:1px!important;color:#d7b565!important;font-size:clamp(7px,1.9vw,10px)!important;font-weight:800!important;letter-spacing:-.03em!important;opacity:.95!important}
.unifiedDock .unifiedNav{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:5px!important;width:100%!important;margin:0!important;padding:0!important}
.unifiedDock .action{min-height:34px!important;border:1.2px solid rgba(247,216,137,.42)!important;border-radius:10px!important;background:linear-gradient(180deg,rgba(18,28,36,.92),rgba(8,15,22,.9))!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 5px 12px rgba(0,0,0,.30)!important;color:#fff4d8!important;text-decoration:none!important;font-size:clamp(10px,2.55vw,13px)!important;font-weight:950!important;display:flex!important;align-items:center!important;justify-content:center!important;line-height:1.0!important;text-align:center!important;letter-spacing:-.06em!important;text-shadow:0 2px 5px rgba(0,0,0,.75)!important;padding:0 2px!important;cursor:pointer!important}
.unifiedDock .action.main,.unifiedDock .action[data-link="hub"],.unifiedDock .action[data-footer="hub"]{background:linear-gradient(180deg,#d49a22,#9b660d)!important;border-color:rgba(255,224,142,.82)!important;color:#fff8e6!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 5px 13px rgba(0,0,0,.34)!important}
@media(min-width:680px){.unifiedDock{border-radius:24px 24px 0 0!important}}
</style>


<style id="CEN-FOOTER-HEIGHT-FIX-V5B">
:root{--cen-footer-h:92px!important;}
.phone.main-content{bottom:calc(92px + env(safe-area-inset-bottom))!important;}
.app-container{background:#020b10!important;}
</style>
</head>
<body>
  <div id="app">
    <main id="viewport" class="viewport" aria-label="통일왕국 매트릭스 화면">
      <section id="canvas" class="canvas">
        <img class="matrix-bg" src="assets/united-kingdom-bg.png" alt="통일왕국 매트릭스 배경" draggable="false" />
        <div class="matrix-title" aria-label="통일왕국 매트릭스 제목">
          <h1>통일왕국 Matrix</h1>
          <p>다윗부터 왕국분열까지</p>
        </div>

        <div class="button-set row-1" data-event="다윗 즉위">
          <a class="hub-button" href="hubs/index.html?hub=david" data-kind="hub"><span>👑</span><b>다윗 즉위 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>주제탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
        <div class="button-set row-2" data-event="예루살렘 정복">
          <a class="hub-button" href="hubs/index.html?hub=jerusalem" data-kind="hub"><span>🏰</span><b>예루살렘 정복 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>주제탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
        <div class="button-set row-3" data-event="언약궤 이전">
          <a class="hub-button" href="hubs/index.html?hub=ark" data-kind="hub"><span>📦</span><b>언약궤 이전 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>주제탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
        <div class="button-set row-4" data-event="성전 건축">
          <a class="hub-button" href="hubs/index.html?hub=temple" data-kind="hub"><span>🏛️</span><b>성전 건축 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>주제탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
        <div class="button-set row-5" data-event="왕국 분열">
          <a class="hub-button" href="hubs/index.html?hub=division" data-kind="hub"><span>⚡</span><b>왕국 분열 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>주제탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
      </section>
    </main>

    <footer class="footer actions unifiedDock" aria-label="통일왕국 하단 네비게이터">
  <div class="coreFlow"><small>통일왕국 핵심흐름</small>사무엘의 기름부음 → 다윗 즉위 → 예루살렘 정복 → 언약궤 이전 → 성전 건축 → 왕국 분열</div>
  <nav class="unifiedNav" aria-label="하단 메뉴">
    <button class="action" type="button" data-link="timeline" data-footer="timeline">성경연표</button>
    <button class="action" type="button" data-link="connect" data-footer="connect">주제탐험</button>
    <button class="action" type="button" data-link="overview" data-footer="overview">한눈에 성경</button>
    <button class="action main" type="button" data-link="hub" data-footer="hub">허브</button>
  </nav>
</footer>
  </div>

  <dialog id="infoDialog" class="dialog">
    <div class="dialog-card">
      <h2 id="dialogTitle">통일왕국</h2>
      <p id="dialogText">통일왕국 탐험창입니다.</p>
      <div class="dialog-actions"><button id="closeDialog" type="button">닫기</button></div>
    </div>
  </dialog>

  <div id="hubListModal" class="hub-list-modal" aria-hidden="true">
    <div class="hub-list-panel" role="dialog" aria-modal="true" aria-label="통일왕국 허브 목록">
      <button type="button" class="hub-list-close" id="hubListClose">×</button>
      <h2>통일왕국 허브 목록</h2>
      <div class="hub-list-grid">
        <a href="hubs/index.html?hub=david"><span>👑</span><b>다윗 즉위 허브</b><small>하나님 마음에 합한 왕</small></a>
        <a href="hubs/index.html?hub=jerusalem"><span>🏰</span><b>예루살렘 정복 허브</b><small>왕국 중심이 세워지다</small></a>
        <a href="hubs/index.html?hub=ark"><span>📦</span><b>언약궤 이전 허브</b><small>하나님의 임재를 모시다</small></a>
        <a href="hubs/index.html?hub=temple"><span>🏛️</span><b>성전 건축 허브</b><small>예배 중심이 세워지다</small></a>
        <a href="hubs/index.html?hub=division"><span>⚡</span><b>왕국 분열 허브</b><small>하나의 왕국이 갈라지다</small></a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

<script id="CEN-UNIFIED-FOOTER-V5-LINKS">
(function(){
  const links={
    timeline:'https://centiger.github.io/CEN-Chronology/?view=timeline',
    connect:'https://centiger.github.io/CEN-Chronology/',
    overview:'https://centiger.github.io/CEN-Bible2.0/#overview66'
  };
  document.addEventListener('click',function(e){
    const btn=e.target.closest && e.target.closest('.unifiedDock .action');
    if(!btn) return;
    const key=btn.dataset.link || btn.dataset.footer || '';
    if(key==='timeline'||key==='connect'||key==='overview'){
      e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
      location.href=links[key];
    }
  },true);
})();
</script>

</body>
</html>
